name: Ingestao Shopee Feed

# CRON LIGADO (v4.0 Fatia 1). Motor revisado (desconto/moda/perifericos corrigidos,
# stale-sweep restrito a loja shopee + BLINDAGEM dos manuais). Loja 'shopee' ja existe.
# ⚠️ REQUISITO: setar o secret SHOPEE_FEED_URL neste repo (URL estavel do datafeed).
# Os demais (NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY) ja existem via scrape.yml.
on:
  schedule:
    - cron: "40 0 * * *" # 21:40 BRT — o feed Shopee atualiza ~20h00-21h30
  workflow_dispatch: {}

concurrency:
  group: shopee-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SHOPEE_FEED_URL: ${{ secrets.SHOPEE_FEED_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PISO_PRECO_BRL: "20"
      SHOPEE_TOP_N: "400"
      SHOPEE_AFFILIATE_ID: "18318451097" # ID de afiliado do dono (publico — vai na URL). Sem isso, links salvos ficam SEM comissao.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/ingest-shopee-feed.ts
