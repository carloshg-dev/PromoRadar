name: Coleta (jobs paralelos, 1x/dia)

# Por que JOBS SEPARADOS: a coleta inteira num job só estoura o timeout de 45 min
# (latência GitHub↔Supabase por produto + throttle do encurtador Lomadee). Cada
# grupo é um job próprio, roda em PARALELO, com seu timeout, e avisa no Discord.
#
# HISTÓRICO: em 03/07 o job "awin+lomadee+carrefour" junto bateu 45 min e foi
# CANCELADO (paginação profunda + tetos maiores). Separado em 2: Awin sozinho
# (pesado no upsert) e Lomadee+Carrefour (throttle do encurtador). ML SAIU: a
# API oficial foi bloqueada (401) — silenciado até migrar p/ Firecrawl.
#
# Firecrawl: só o Amazon usa (browser). Awin/Lomadee/Carrefour = HTTP das APIs
# das próprias plataformas (Shopify/VTEX/CSV) — não gastam crédito Firecrawl.

on:
  schedule:
    - cron: "0 9 * * *" # 06:00 BRT — coleta diária completa
  workflow_dispatch: {}

concurrency:
  group: coleta
  cancel-in-progress: false

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  PROMODETEC_LEADS_DISCORD_WEBHOOK_URL: ${{ secrets.PROMODETEC_LEADS_DISCORD_WEBHOOK_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  DISCORD_DEALS_WEBHOOK_URL: ${{ secrets.DISCORD_DEALS_WEBHOOK_URL }}
  TELEGRAM_FEED_CHAT_ID: ${{ secrets.TELEGRAM_FEED_CHAT_ID }}
  AWIN_DATAFEED_URL: ${{ secrets.AWIN_DATAFEED_URL }}
  LOMADEE_API_KEY: ${{ secrets.LOMADEE_API_KEY }}
  LOMADEE_SOURCE_ID: ${{ secrets.LOMADEE_SOURCE_ID }} # trava de comissão (canal 66222f2a); só valida, não injeta na API
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  amazon:
    name: Amazon (Firecrawl)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPE_VIA_FIRECRAWL: "1" # ÚNICO job que gasta crédito Firecrawl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run scrape amazon

  awin:
    name: Awin (feed multi-loja)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run scrape awin

  lomadee-carrefour:
    name: Lomadee + Carrefour
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run scrape lomadee carrefour kabum

  digest:
    name: Resumo diário do site + Lista de afiliação
    # roda por ÚLTIMO: espera os jobs de coleta pra a "Lista real de afiliação" ser
    # o retrato FINAL (Kabum/Dufrio já dentro). `if: always()` = envia mesmo se um
    # job de coleta falhar (o resumo/lista não dependem de todos terem sucesso).
    needs: [amazon, awin, lomadee-carrefour]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run digest
