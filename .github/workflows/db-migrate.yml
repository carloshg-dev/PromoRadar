name: DB Migrate (rodar SQL do repo)

# Executa um arquivo db/*.sql no Supabase via psql (mesmo secret do backup.yml).
# Uso: Actions → DB Migrate → Run workflow → informe o arquivo (default campanhas).
# Idempotente se o SQL for (os nossos usam IF NOT EXISTS). Ferramenta permanente
# p/ migrações sem depender de rodar à mão no SQL Editor.

on:
  workflow_dispatch:
    inputs:
      arquivo:
        description: "Arquivo SQL (relativo à raiz do repo)"
        default: "db/campanhas.sql"
        required: true

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Rodar migração
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Falta o secret SUPABASE_DB_URL (string 'Session pooler' do Supabase)."
            exit 1
          fi
          if [ ! -f "${{ github.event.inputs.arquivo }}" ]; then
            echo "::error::Arquivo não encontrado: ${{ github.event.inputs.arquivo }}"
            exit 1
          fi
          # stderr do psql NUNCA vai pro log (repo público: erro de conexão pode
          # ecoar fragmentos da URI/senha — aconteceu em 17/07, logs deletados).
          if ! psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "${{ github.event.inputs.arquivo }}" 2>/tmp/psql-err.txt; then
            if grep -qiE "translate host|could not connect|unreachable|authentication" /tmp/psql-err.txt; then
              echo "::error::Conexão/autenticação falhou — confira o secret SUPABASE_DB_URL (Session Pooler IPv4; senha SEM caracteres especiais, ou percent-encoded)."
            else
              echo "::error::psql falhou ao aplicar a migração (detalhe suprimido por segurança — repo público)."
            fi
            exit 1
          fi
          echo "✅ Migração aplicada: ${{ github.event.inputs.arquivo }}"
